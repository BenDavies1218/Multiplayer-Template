services:
  server:
    image: ghcr.io/bendavies1218/multiplayer-template-server:latest
    ports:
      - "5888:5888"
    volumes:
      - ../../assets:/data/assets:ro
      - ../../certificates:/certificates:ro
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5888
      - ASSET_PATH=/data/assets
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5888"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - test-network

  client:
    image: ghcr.io/bendavies1218/multiplayer-template-native:latest
    command: ["client", "--headless"]
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - ASSET_PATH=/data/assets
      - SERVER_HOST=server
      - SERVER_PORT=5888
    volumes:
      - ../../assets:/data/assets:ro
    depends_on:
      server:
        condition: service_healthy
    deploy:
      replicas: ${NUM_CLIENTS:-1}
    networks:
      - test-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - test-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - test-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
