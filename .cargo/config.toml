# Fast compile configuration for Bevy development
# Dynamic linking speeds up iterative builds significantly

[alias]
# Fast dev build (dynamic linking enabled)
dev = "run --features bevy/dynamic_linking"
# Fast dev build for specific package
dev-native = "run -p native --features bevy/dynamic_linking -- client -c 1"
dev-server = "run -p server --features bevy/dynamic_linking -- server"
# World viewer for quick world asset testing (no networking)
dev-viewer = "run -p world-viewer --features bevy/dynamic_linking"
